name: Core Extension E2E Regression Tests

on:
  schedule:
    - cron: '0 11 * * 1-5'
  workflow_dispatch:
    inputs:
      test-branch:
        description: 'Branch name to checkout for test files'
        required: true
        default: 'main'
      build-from-branch:
        type: choice
        description: 'Build extension from test-branch instead of downloading the latest alpha release? (use when the test branch adds source-side changes the tests depend on, e.g. new data-testids)'
        options:
          - 'false'
          - 'true'
        default: 'false'
      test-scope:
        type: choice
        description: 'What to run? (regression-plus-opt-ins respects the dropdowns below; the other modes ignore them)'
        options:
          - 'regression-plus-opt-ins'
          - 'swap-cross-chain-only'
          - 'swap-live-only'
        default: 'regression-plus-opt-ins'
      include-live-swaps:
        type: choice
        description: 'Also run live single-chain swap tests? (real on-chain transactions; ignored unless scope is regression-plus-opt-ins)'
        options:
          - 'false'
          - 'true'
        default: 'false'
      include-cross-chain-swaps:
        type: choice
        description: 'Also run live cross-chain swap tests? (~20 min per pair, real on-chain transactions; ignored unless scope is regression-plus-opt-ins)'
        options:
          - 'false'
          - 'true'
        default: 'false'
      send-slack:
        type: choice
        description: 'Send slack notification?'
        options:
          - 'true'
          - 'false'
        default: 'true'

jobs:
  download:
    name: Download or Build Extension
    runs-on: ubuntu-latest-16-cores-core-extension
    environment: alpha
    env:
      TESTRAIL_EMAIL: ${{ secrets.TESTRAIL_EMAIL }}
      TESTRAIL_API_KEY: ${{ secrets.TESTRAIL_API_KEY }}
    outputs:
      test_run_id: ${{ steps.create-testrail-run.outputs.test_run_id }}
      release_tag: ${{ steps.download-release.outputs.release_tag }}
      build_source: ${{ steps.identify-source.outputs.build_source }}

    steps:
      # ── Path A: download the latest alpha release ───────────────────────
      # Default behaviour for scheduled runs and any workflow_dispatch where
      # `build-from-branch` is false. Sparse checkout is enough — we only
      # need to run `gh release download` from this clone.
      - name: Checkout (download path — sparse)
        if: ${{ github.event.inputs.build-from-branch != 'true' }}
        uses: actions/checkout@v4
        with:
          sparse-checkout: '.'
          sparse-checkout-cone-mode: false

      - name: Download latest alpha release
        id: download-release
        if: ${{ github.event.inputs.build-from-branch != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh release list --limit 20 --json tagName,isPrerelease,isDraft \
            --jq '[.[] | select(.isPrerelease and (.isDraft | not) and (.tagName | contains("-alpha.")))] | .[0].tagName')

          if [ -z "$TAG" ]; then
            echo "::error::No alpha pre-release found on GitHub Releases"
            exit 1
          fi

          echo "Downloading release: $TAG"
          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"

          gh release download "$TAG" --pattern "*.zip" --dir ./tmp
          mkdir -p ./dist
          unzip ./tmp/*.zip -d ./dist
          echo "Extension unpacked to ./dist"
          ls -la ./dist

      # ── Path B: build the extension from `test-branch` ──────────────────
      # Used when the test branch adds source-side changes (e.g. new data-
      # testids) that the tests depend on, before those changes have landed
      # in main and rolled into the latest alpha release. Mirrors the alpha
      # build pipeline in `.github/workflows/main_branch.yaml`.
      - name: Checkout (build path — full)
        if: ${{ github.event.inputs.build-from-branch == 'true' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.test-branch || 'main' }}
          fetch-depth: 0

      - name: Setup Node.js (build path)
        if: ${{ github.event.inputs.build-from-branch == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.3

      - name: Enable corepack (build path)
        if: ${{ github.event.inputs.build-from-branch == 'true' }}
        run: corepack enable

      - name: Create .env.production (build path)
        if: ${{ github.event.inputs.build-from-branch == 'true' }}
        run: |
          touch .env.production
          echo RELEASE=alpha >> .env.production
          echo 'POSTHOG_KEY="${{ secrets.POSTHOG_KEY }}"' >> .env.production
          echo 'POSTHOG_URL="${{ secrets.POSTHOG_URL }}"' >> .env.production
          echo 'ANALYTICS_ENCRYPTION_KEY="${{ secrets.ANALYTICS_ENCRYPTION_KEY }}"' >> .env.production
          echo 'ANALYTICS_ENCRYPTION_KEY_ID="${{ secrets.ANALYTICS_ENCRYPTION_KEY_ID }}"' >> .env.production
          echo 'COVALENT_API_KEY="${{ secrets.COVALENT_API_KEY }}"' >> .env.production
          echo 'GLACIER_URL="${{ secrets.GLACIER_URL }}"' >> .env.production
          echo 'PROXY_URL="${{ secrets.PROXY_URL }}"' >> .env.production
          echo 'CORE_EXTENSION_LANDING_URL="${{ secrets.CORE_EXTENSION_LANDING_URL }}"' >> .env.production
          echo 'SENTRY_DSN="${{ secrets.SENTRY_DSN }}"' >> .env.production
          echo 'CORE_WEB_BASE_URL="${{ secrets.CORE_WEB_BASE_URL }}"' >> .env.production
          echo 'WALLET_CONNECT_PROJECT_ID="${{ secrets.WALLET_CONNECT_PROJECT_ID }}"' >> .env.production
          echo 'SEEDLESS_URL="${{ secrets.SEEDLESS_URL }}"' >> .env.production
          echo 'SEEDLESS_ORG_ID="${{ secrets.SEEDLESS_ORG_ID }}"' >> .env.production
          echo 'GOOGLE_OAUTH_CLIENT_ID="${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}"' >> .env.production
          echo 'APPLE_OAUTH_CLIENT_ID="${{ secrets.APPLE_OAUTH_CLIENT_ID }}"' >> .env.production
          echo 'APPLE_OAUTH_REDIRECT_URL="${{ secrets.APPLE_OAUTH_REDIRECT_URL }}"' >> .env.production
          echo 'CUBESIGNER_ENV="${{ secrets.CUBESIGNER_ENV }}"' >> .env.production
          echo 'SEEDLESS_FIDO_IDENTITY_URL="${{ secrets.SEEDLESS_FIDO_IDENTITY_URL }}"' >> .env.production
          echo 'NEWSLETTER_BASE_URL="${{ secrets.NEWSLETTER_BASE_URL }}"' >> .env.production
          echo 'NEWSLETTER_PORTAL_ID="${{ secrets.NEWSLETTER_PORTAL_ID }}"' >> .env.production
          echo 'NEWSLETTER_FORM_ID="${{ secrets.NEWSLETTER_FORM_ID }}"' >> .env.production
          echo 'FIREBASE_CONFIG="${{ secrets.FIREBASE_CONFIG }}"' >> .env.production
          echo 'ID_SERVICE_URL="${{ secrets.ID_SERVICE_URL }}"' >> .env.production
          echo 'GASLESS_SERVICE_URL="${{ secrets.GASLESS_SERVICE_URL }}"' >> .env.production
          echo 'NOTIFICATION_SENDER_SERVICE_URL="${{ secrets.NOTIFICATION_SENDER_SERVICE_URL }}"' >> .env.production
          echo 'EXTENSION_PUBLIC_KEY="${{ secrets.EXTENSION_PUBLIC_KEY }}"' >> .env.production
          echo 'BALANCE_SERVICE_URL="${{ secrets.BALANCE_SERVICE_URL }}"' >> .env.production
          echo 'PROFILE_SERVICE_URL="${{ secrets.PROFILE_SERVICE_URL }}"' >> .env.production
          echo 'TOKEN_AGGREGATOR_SERVICE_URL="${{ secrets.TOKEN_AGGREGATOR_SERVICE_URL }}"' >> .env.production
          echo 'MARKR_API_URL="${{ secrets.MARKR_API_URL }}"' >> .env.production
          echo 'MARKR_API_TOKEN="${{ secrets.MARKR_API_TOKEN }}"' >> .env.production

      - name: Install dependencies (build path)
        if: ${{ github.event.inputs.build-from-branch == 'true' }}
        run: |
          yarn install
          yarn allow-scripts

      - name: Build extension from test-branch
        if: ${{ github.event.inputs.build-from-branch == 'true' }}
        run: |
          yarn build:alpha
          echo "Extension built to ./dist from branch: ${{ github.event.inputs.test-branch }}"
          ls -la ./dist

      # ── Common: upload artifact, identify source, create TestRail run ──
      - name: Identify build source
        id: identify-source
        run: |
          if [ "${{ github.event.inputs.build-from-branch }}" = "true" ]; then
            echo "build_source=branch:${{ github.event.inputs.test-branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "build_source=release:${{ steps.download-release.outputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension
          path: ./dist

      - name: Install TestRail CLI
        run: pip3 install trcli

      - name: Create test run in TestRail
        id: create-testrail-run
        run: |
          TS=$(date -u +'%Y-%m-%d-%H:%M:%S')
          SOURCE="${{ steps.identify-source.outputs.build_source }}"
          TEST_RUN_ID=$(trcli -y -h https://avalabs.testrail.io \
            --project "New Gen Core Extension" \
            --username ${{ env.TESTRAIL_EMAIL }} \
            --key ${{ env.TESTRAIL_API_KEY }} \
            add_run --title "Extension Playwright Regression Run - $TS ($SOURCE)" \
            --run-include-all | grep "run_id:" | awk '{print $2}')
          echo "test_run_id=$TEST_RUN_ID" >> $GITHUB_OUTPUT

  testrail-drift:
    name: TestRail Automation ID Drift (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      TESTRAIL_HOST: https://avalabs.testrail.io
      TESTRAIL_EMAIL: ${{ secrets.TESTRAIL_EMAIL }}
      TESTRAIL_API_KEY: ${{ secrets.TESTRAIL_API_KEY }}
      TESTRAIL_PROJECT_ID: ${{ secrets.TESTRAIL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.test-branch || 'main' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.3

      - name: Enable corepack
        run: corepack enable

      - name: Install E2E dependencies
        working-directory: e2e
        run: yarn install --immutable

      - name: Run TestRail drift report
        working-directory: e2e
        run: yarn testrail:report --jsonOut /tmp/drift.json

      - name: Publish drift to job summary (only when drift exists)
        if: always()
        run: |
          if [ ! -f /tmp/drift.json ]; then
            echo "Drift report did not produce JSON output — skipping summary."
            exit 0
          fi

          MISSING=$(jq -r '.counts.missingInTestRail // 0' /tmp/drift.json)
          DUPES=$(jq -r '.counts.duplicates // 0' /tmp/drift.json)
          UNANN=$(jq -r '.counts.unannotated // 0' /tmp/drift.json)
          ORPHAN=$(jq -r '.counts.missingInLocal // 0' /tmp/drift.json)
          CANDS=$(jq -r '.counts.updateCandidates // 0' /tmp/drift.json)
          TOTAL=$((MISSING + DUPES + UNANN + ORPHAN + CANDS))

          if [ "$TOTAL" -eq 0 ]; then
            echo "No TestRail drift detected. Skipping summary."
            exit 0
          fi

          {
            echo "## TestRail automation ID drift (advisory)"
            echo ""
            echo "| Type | Count |"
            echo "| ---- | -----:|"
            echo "| Local IDs missing in TestRail | $MISSING |"
            echo "| TestRail IDs missing locally  | $ORPHAN |"
            echo "| Duplicate local IDs           | $DUPES |"
            echo "| Tests without automation_id   | $UNANN |"
            echo "| Title-match sync candidates   | $CANDS |"
            echo ""

            if [ "$MISSING" -gt 0 ]; then
              echo "### Local IDs missing in TestRail"
              jq -r '.missingInTestRail[] | "- \(.)"' /tmp/drift.json
              echo ""
            fi

            if [ "$ORPHAN" -gt 0 ]; then
              echo "### TestRail IDs missing locally"
              jq -r '.missingInLocal[] | "- \(.)"' /tmp/drift.json
              echo ""
            fi

            if [ "$DUPES" -gt 0 ]; then
              echo "### Duplicate local automation IDs"
              jq -r '.duplicateIds[] | "- **\(.id)** — " + (.files | join(", "))' /tmp/drift.json
              echo ""
            fi

            if [ "$UNANN" -gt 0 ]; then
              echo "### Tests missing custom_automation_id annotation"
              jq -r '.unannotated[] | "- \(.title) — `\(.file):\(.line)`"' /tmp/drift.json
              echo ""
            fi

            if [ "$CANDS" -gt 0 ]; then
              echo "### Title-match sync candidates"
              jq -r '.updateCandidates[] | "- Case \(.caseId): \(.title) — `\(if (.fromValue // "") == "" then "(empty)" else .fromValue end)` → `\(.toValue)`"' /tmp/drift.json
              echo ""
            fi

            echo "_Run \`yarn testrail:sync\` locally to push title-matched updates._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testrail-drift-report
          path: /tmp/drift.json
          if-no-files-found: ignore
          retention-days: 14

  e2e:
    name: Run E2E Tests - Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
    runs-on: ubuntu-latest-16-cores-core-extension
    needs: download
    environment: e2e
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2]
        shardTotal: [2]
    env:
      CI: true
      AWS_REGION: us-east-1
      SNAPSHOT_SET: alpha
      TEST_RUN_ID: ${{ needs.download.outputs.test_run_id }}
      TESTRAIL_EMAIL: ${{ secrets.TESTRAIL_EMAIL }}
      TESTRAIL_API_KEY: ${{ secrets.TESTRAIL_API_KEY }}
      WALLET_PASSWORD: ${{ secrets.WALLET_PASSWORD }}
      RECOVERY_PHRASE_12_WORDS: ${{ secrets.RECOVERY_PHRASE_12_WORDS }}
      RECOVERY_PHRASE_24_WORDS: ${{ secrets.RECOVERY_PHRASE_24_WORDS }}
      APITOKEN_CRYPTOAPIS: ${{ secrets.APITOKEN_CRYPTOAPIS }}
      APITOKEN_ETHERSCAN: ${{ secrets.APITOKEN_ETHERSCAN }}
      APITOKEN_GLACIER: ${{ secrets.APITOKEN_GLACIER }}

    container:
      image: mcr.microsoft.com/playwright:v1.55.1-noble
      options: --ipc=host --security-opt=seccomp=unconfined --cap-add=SYS_ADMIN --shm-size=4gb --memory=6g --cpus=4

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.test-branch || 'main' }}
          fetch-depth: 0

      - name: Install Chrome
        working-directory: e2e
        run: |
          apt-get update
          apt-get install -y wget gnupg
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google.list
          apt-get update
          apt-get install -y google-chrome-stable

      - name: Download built extension
        uses: actions/download-artifact@v4
        with:
          name: extension
          path: ./dist

      - name: Output Github runner
        run: curl ifconfig.io

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.3

      - name: Enable corepack
        run: corepack enable

      - name: Install E2E dependencies
        working-directory: e2e
        run: |
          yarn install

      - name: Set Python for AWS CLI
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1.7.0
        with:
          role-to-assume: arn:aws:iam::975050371175:role/github-flow-sa-role
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}

      - name: Install AWS dependencies
        shell: bash
        run: |
          python3 -m venv ~/py_env
          source ~/py_env/bin/activate
          pip3 install awscli

      - name: Download Extension snapshots from AWS S3 bucket
        shell: bash
        working-directory: e2e/helpers
        run: |
          mkdir -p storage-snapshots/alpha
          cd storage-snapshots/alpha
          source ~/py_env/bin/activate
          echo "=== Listing S3 bucket contents ==="
          aws s3 ls s3://core-qa-automation-snapshots/ext/alpha/ || echo "Failed to list S3 bucket"
          echo "=== Downloading snapshots ==="
          aws s3 sync s3://core-qa-automation-snapshots/ext/alpha/ .
          echo "=== Downloaded files ==="
          ls -la

      - name: Run Playwright tests
        working-directory: e2e
        env:
          PLAYWRIGHT_SHARD: ${{ matrix.shardIndex }}
          TEST_SCOPE: ${{ github.event.inputs.test-scope || 'regression-plus-opt-ins' }}
          INCLUDE_LIVE_SWAPS: ${{ github.event.inputs.include-live-swaps || 'false' }}
          INCLUDE_CROSS_CHAIN_SWAPS: ${{ github.event.inputs.include-cross-chain-swaps || 'false' }}
        run: |
          # POSIX-compliant grep composition (runs in `sh -e`, no bash arrays).
          # TEST_SCOPE selects between additive (regression + opt-ins) and
          # exclusive (single-tag-only) modes:
          #   regression-plus-opt-ins → @regression baseline, plus the two
          #                             include-* dropdowns if true (default)
          #   swap-cross-chain-only   → just @swap-cross-chain (no regression)
          #   swap-live-only          → just @swap-live (no regression)
          case "$TEST_SCOPE" in
            swap-cross-chain-only)
              GREP_PATTERN="@swap-cross-chain"
              ;;
            swap-live-only)
              GREP_PATTERN="@swap-live"
              ;;
            *)
              GREP_PATTERN="@regression"
              [ "$INCLUDE_LIVE_SWAPS" = "true" ] && GREP_PATTERN="$GREP_PATTERN|@swap-live"
              [ "$INCLUDE_CROSS_CHAIN_SWAPS" = "true" ] && GREP_PATTERN="$GREP_PATTERN|@swap-cross-chain"
              ;;
          esac
          echo "Running tests with grep: $GREP_PATTERN  (scope: $TEST_SCOPE)"
          xvfb-run --auto-servernum --server-args='-screen 0 1280x1024x24' \
            npx playwright test --headed \
            --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} \
            --grep="$GREP_PATTERN"

      - name: Upload results to TestRail
        if: always() && env.TEST_RUN_ID != ''
        shell: bash
        run: |
          source ~/py_env/bin/activate
          pip3 install trcli
          trcli -n -h https://avalabs.testrail.io \
            --project "New Gen Core Extension" \
            --username ${{ env.TESTRAIL_EMAIL }} \
            --key ${{ env.TESTRAIL_API_KEY }} \
            parse_junit -f ./e2e/test-results/junit-report-${{ matrix.shardIndex }}.xml \
            --run-id=${{ env.TEST_RUN_ID }}

      - name: Output TestRail run link
        if: always() && env.TEST_RUN_ID != ''
        run: echo https://avalabs.testrail.io/index.php?/runs/view/${{ env.TEST_RUN_ID }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.shardIndex }}
          path: |
            e2e/test-results
          retention-days: 30

  slack-notification:
    name: Send Slack Notification
    runs-on: ubuntu-latest
    environment: e2e
    needs: [download, e2e]
    if: always()
    env:
      TEST_RUN_ID: ${{ needs.download.outputs.test_run_id }}

    steps:
      - name: Notify Slack on success
        if: ${{ (github.event.inputs.send-slack || 'true') == 'true' && needs.e2e.result == 'success' }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.QA_EXT_SLACK_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            {
              "GH_RUN_LINK": "https://github.com/ava-labs/core-extension/actions/runs/${{ github.run_id }}",
              "GH_RUN_STATUS": "PASSED",
              "STATUS_EMOJI": ":white_check_mark:",
              "TEST_RUN_TYPE": "Core Extension regression tests",
              "BRANCH": "${{ github.head_ref || github.ref_name }}",
              "TR_RUN_LINK": "https://avalabs.testrail.io/index.php?/runs/view/${{ env.TEST_RUN_ID }}"
            }

      - name: Notify Slack on failure
        if: ${{ (github.event.inputs.send-slack || 'true') == 'true' && needs.e2e.result == 'failure' }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.QA_EXT_SLACK_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            {
              "GH_RUN_LINK": "https://github.com/ava-labs/core-extension/actions/runs/${{ github.run_id }}",
              "GH_RUN_STATUS": "FAILED",
              "STATUS_EMOJI": ":alert:",
              "TEST_RUN_TYPE": "Core Extension regression tests",
              "BRANCH": "${{ github.head_ref || github.ref_name }}",
              "TR_RUN_LINK": "https://avalabs.testrail.io/index.php?/runs/view/${{ env.TEST_RUN_ID }}"
            }
